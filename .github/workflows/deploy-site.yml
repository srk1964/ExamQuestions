name: Deploy Infra and Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # --- Frontend build ---
      - name: Clean install dependencies (frontend)
        working-directory: frontend
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Compute frontend dist hash
        working-directory: frontend
        id: hash
        run: |
          # compute a deterministic hash of the built files
          find dist -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum | awk '{print $1}' > deploy-hash.txt
          echo "DEPLOY_HASH=$(cat deploy-hash.txt)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build Lambda
        run: |
          cd infra/lambda/list-subjects
          npm install
         # npm run build

      # --- Infra deploy ---
      - name: Clean install dependencies (infra)
        working-directory: infra
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Wait for CloudFormation stack to be ready
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          # Poll CloudFormation stack status and wait until it is in a stable state.
          # This avoids starting a deployment while a previous update is still in progress.
          STACK_NAME=QuizInfraStack
          MAX_ATTEMPTS=30
          SLEEP_SECONDS=10

          attempt=0
          while [ $attempt -lt $MAX_ATTEMPTS ]; do
            status=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "NO_STACK")
            echo "CloudFormation stack status: $status"

            case "$status" in
              NO_STACK|CREATE_COMPLETE|UPDATE_COMPLETE|ROLLBACK_COMPLETE|UPDATE_ROLLBACK_COMPLETE|DELETE_COMPLETE)
                echo "Stack is in a stable state: $status"
                exit 0
                ;;
              *)
                echo "Stack is in transient state (waiting): $status"
                attempt=$((attempt+1))
                sleep $SLEEP_SECONDS
                ;;
            esac
          done

          echo "Timed out waiting for CloudFormation to become stable after $((MAX_ATTEMPTS * SLEEP_SECONDS)) seconds"
          exit 1

      - name: CDK Deploy
        working-directory: infra
        run: |
          # Retry deploy a couple times to tolerate brief races where the stack leaves UPDATE_IN_PROGRESS
          set -e
          MAX_RETRIES=2
          RETRY_DELAY=5
          i=0
          until [ $i -gt $MAX_RETRIES ]
          do
            if npx cdk deploy --require-approval never -c deployHash=${{ steps.hash.outputs.DEPLOY_HASH }}; then
              echo 'CDK deploy succeeded'
              break
            fi
            i=$((i+1))
            echo "CDK deploy failed, retrying in ${RETRY_DELAY}s... (attempt: $i)"
            sleep $RETRY_DELAY
          done
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Ensure runtime config.json is present and invalidated
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
